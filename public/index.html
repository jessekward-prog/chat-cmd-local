<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Away!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff7f0;
      font-family: 'Nunito', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #ffd166;
      opacity: 0.5;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    #answer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 4rem 0.5rem;
      position: relative;
      z-index: 1;
      min-height: 0;
    }

    #mascot {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 1.2rem;
      animation: bounce 2.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #mascot.thinking {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* answer box + bubble wrapper */
    #answer-container {
      position: relative;
      max-width: 800px;
      width: 100%;
    }

    #answer {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem 2.5rem;
      width: 100%;
      font-size: clamp(1.2rem, 3.2vw, 2.4rem);
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      color: #2d2d2d;
      white-space: pre-wrap;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(255, 150, 50, 0.15), 0 2px 8px rgba(0,0,0,0.06);
      border: 3px solid #ffe0b2;
    }

    #answer.empty {
      color: #bbb;
      font-weight: 400;
      font-size: clamp(1rem, 2vw, 1.4rem);
      border-style: dashed;
    }

    /* thought bubble */
    #more-bubble {
      display: none;
      position: absolute;
      right: -52px;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: white;
      border: 3px solid #ffe0b2;
      box-shadow: 0 4px 16px rgba(255, 150, 50, 0.25);
      font-size: 1.5rem;
      font-weight: 900;
      color: #ff9a3c;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      animation: bob 2s ease-in-out infinite;
      z-index: 2;
      /* tail dots via box-shadow */
    }

    #more-bubble::before,
    #more-bubble::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: white;
      border: 2.5px solid #ffe0b2;
    }

    #more-bubble::before {
      width: 12px;
      height: 12px;
      left: -14px;
      top: 55%;
    }

    #more-bubble::after {
      width: 7px;
      height: 7px;
      left: -23px;
      top: 65%;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(-50%); }
      50%       { transform: translateY(calc(-50% - 8px)); }
    }

    #more-bubble:active {
      transform: translateY(-50%) scale(0.92);
      animation: none;
    }

    /* ── mic area ── */
    #mic-area {
      padding: 1rem 2rem calc(1.4rem + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
    }

    #question {
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 700;
      color: #b07a40;
      min-height: 1.3em;
      text-align: center;
      max-width: 40ch;
      opacity: 0.85;
    }

    /* text input row */
    #text-input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
    }

    #text-input {
      flex: 1;
      border: 2.5px solid #ffe0b2;
      border-radius: 2rem;
      padding: 0.55rem 1.2rem;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 700;
      color: #2d2d2d;
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }

    #text-input:focus {
      border-color: #ff9a3c;
    }

    #text-input::placeholder {
      color: #ccc;
      font-weight: 400;
    }

    #text-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #ff9a3c;
      color: white;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.08s;
    }

    #text-send:active {
      transform: scale(0.92);
      background: #d4661a;
    }

    #text-send:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .mic-btn {
      width: clamp(110px, 30vw, 170px);
      height: clamp(110px, 30vw, 170px);
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 30%,
        color-mix(in srgb, #ff9a3c 60%, white),
        #ff9a3c 65%,
        #d4661a);
      box-shadow: 0 10px 0 #d4661a, 0 16px 28px rgba(255, 107, 107, 0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.2s ease;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .mic-btn svg {
      width: 48%;
      height: 48%;
      fill: white;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
    }

    .mic-btn.holding {
      transform: translateY(7px);
      box-shadow: 0 3px 0 #1a7d6e, 0 5px 14px rgba(78, 205, 196, 0.3);
      background: radial-gradient(circle at 35% 30%,
        color-mix(in srgb, #4ecdc4 50%, white),
        #4ecdc4 65%,
        #1a7d6e);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .mic-btn:disabled {
      opacity: 0.4;
      cursor: default;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 3px 0 #1a7d6e, 0 0 0 0 rgba(78, 205, 196, 0.5); }
      50%       { box-shadow: 0 3px 0 #1a7d6e, 0 0 0 20px rgba(78, 205, 196, 0); }
    }

    #status {
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      color: #b07a40;
      min-height: 1.3em;
      text-align: center;
      opacity: 0.7;
    }

    #status.error { color: #c0392b; opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      .mic-btn.holding { animation: none; }
      #more-bubble { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="stars"></div>

  <div id="answer-wrap">
    <div id="mascot">🌟</div>
    <div id="answer-container">
      <div id="answer" class="empty">Hold the button and ask me anything!</div>
      <button id="more-bubble" aria-label="Tell me more">?</button>
    </div>
  </div>

  <div id="mic-area">
    <p id="question"></p>
    <div id="text-input-row">
      <input type="text" id="text-input" placeholder="Type a question..." autocomplete="off" />
      <button id="text-send" aria-label="Send">&#8594;</button>
    </div>
    <button id="mic" class="mic-btn" aria-label="Hold to ask">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>
    <p id="status"></p>
  </div>

  <script>
  (() => {
    const answerEl    = document.getElementById('answer');
    const mascotEl    = document.getElementById('mascot');
    const micEl       = document.getElementById('mic');
    const statusEl    = document.getElementById('status');
    const questionEl  = document.getElementById('question');
    const moreBubble  = document.getElementById('more-bubble');
    const textInput   = document.getElementById('text-input');
    const textSend    = document.getElementById('text-send');

    const history = [];
    const mascots = ['🌟', '🦄', '🐬', '🦋', '🌈', '🐙', '🦊', '🐸'];
    let lastQuestion = null;

    // Scatter background stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = 6 + Math.random() * 10;
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*2}s`;
      starsEl.appendChild(s);
    }

    // ── Slow scroll ───────────────────────────────────────────
    const slowScroll = (el) => {
      const end = el.scrollHeight - el.clientHeight;
      if (end <= 0) return;
      const start = el.scrollTop;
      const duration = 3500;
      const t0 = performance.now();
      const step = (now) => {
        const p = Math.min((now - t0) / duration, 1);
        const eased = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
        el.scrollTop = start + eased * (end - start);
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    };

    // ── Piper TTS ─────────────────────────────────────────────
    let currentAudio = null;

    const cancelAudio = () => {
      if (currentAudio) {
        currentAudio.pause();
        URL.revokeObjectURL(currentAudio.src);
        currentAudio = null;
      }
    };

    const speakResponse = async (text) => {
      cancelAudio();
      try {
        const resp = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!resp.ok) return;
        const url = URL.createObjectURL(await resp.blob());
        const audio = new Audio(url);
        currentAudio = audio;
        audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
        audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; };
        audio.play().catch(() => {});
      } catch (_) {}
    };

    // ── Shared UI helpers ─────────────────────────────────────
    const setStatus = (msg, isError = false) => {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('error', isError);
    };

    const setLoading = (statusMsg) => {
      moreBubble.style.display = 'none';
      answerEl.className = 'loading';
      answerEl.textContent = '...';
      mascotEl.className = 'thinking';
      micEl.disabled = true;
      textSend.disabled = true;
      textInput.disabled = true;
      setStatus(statusMsg);
    };

    const setDone = (content) => {
      answerEl.className = '';
      answerEl.scrollTop = 0;
      answerEl.textContent = content;
      mascotEl.className = '';
      mascotEl.textContent = mascots[Math.floor(Math.random() * mascots.length)];
      setStatus('');
      micEl.disabled = false;
      textSend.disabled = false;
      textInput.disabled = false;
      moreBubble.style.display = 'flex';
      speakResponse(content);
      setTimeout(() => slowScroll(answerEl), 800);
    };

    const setError = () => {
      answerEl.className = 'empty';
      answerEl.textContent = 'oops! something went wrong.';
      mascotEl.className = '';
      micEl.disabled = false;
      textSend.disabled = false;
      textInput.disabled = false;
      setStatus('Something went wrong', true);
    };

    // ── Short answer ──────────────────────────────────────────
    async function send(text) {
      if (!text) return;
      lastQuestion = text;
      history.push({ role: 'user', content: text });
      setLoading('Thinking...');
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const { content } = await res.json();
        history.push({ role: 'assistant', content });
        setDone(content);
      } catch {
        setError();
      }
    }

    // ── Tell me more ──────────────────────────────────────────
    moreBubble.addEventListener('click', async () => {
      if (!lastQuestion) return;
      setLoading('Telling you more...');
      try {
        const res = await fetch('/api/chat-more', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: lastQuestion }),
        });
        const { content } = await res.json();
        setDone(content);
      } catch {
        setError();
      }
    });

    // ── Text input ────────────────────────────────────────────
    const submitText = () => {
      const text = textInput.value.trim();
      if (!text || micEl.disabled) return;
      questionEl.textContent = text;
      textInput.value = '';
      cancelAudio();
      send(text);
    };

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitText();
    });
    textSend.addEventListener('click', submitText);

    // ── Speech recognition ────────────────────────────────────
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SR) {
      setStatus('Speech not supported — try Chrome or Safari', true);
      micEl.disabled = true;
      return;
    }

    let recognition = null;
    let holding = false;
    let listening = false;
    let gotResult = false;
    let restarted = false;

    const createRecognition = () => {
      const sr = new SR();
      sr.lang = 'en-AU';
      sr.continuous = false;
      sr.interimResults = false;
      sr.maxAlternatives = 1;

      sr.onstart = () => { listening = true; setStatus('Listening...'); };

      sr.onresult = (e) => {
        gotResult = true;
        const transcript = e.results[0]?.[0]?.transcript;
        if (transcript) {
          questionEl.textContent = transcript;
          holding = false;
          micEl.classList.remove('holding');
          cancelAudio();
          send(transcript);
        }
      };

      sr.onerror = (e) => {
        listening = false;
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          holding = false;
          micEl.classList.remove('holding');
          recognition = null;
          setStatus('Microphone blocked — check browser settings', true);
        } else if (e.error === 'no-speech') {
          setStatus("Didn't hear anything — try again");
        } else if (e.error !== 'aborted') {
          setStatus('Mic error: ' + e.error, true);
          recognition = null;
        }
      };

      sr.onend = () => {
        listening = false;
        if (holding && !gotResult && !restarted) {
          restarted = true;
          try { sr.start(); } catch (_) { recognition = null; }
          return;
        }
        holding = false;
        micEl.classList.remove('holding');
        if (!gotResult) setStatus("Didn't catch that — try again");
      };

      return sr;
    };

    const startListening = () => {
      if (listening) return;
      cancelAudio();
      gotResult = false;
      restarted = false;
      if (!recognition) recognition = createRecognition();
      try {
        recognition.start();
      } catch (_) {
        recognition = createRecognition();
        try { recognition.start(); } catch (__) {
          holding = false;
          micEl.classList.remove('holding');
          setStatus('Tap again to try', true);
        }
      }
    };

    const stopListening = () => {
      if (!recognition) return;
      try { recognition.stop(); } catch (_) {}
    };

    micEl.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (holding || micEl.disabled) return;
      holding = true;
      micEl.classList.add('holding');
      if (e.pointerId !== undefined && micEl.setPointerCapture) {
        try { micEl.setPointerCapture(e.pointerId); } catch (_) {}
      }
      if (navigator.vibrate) navigator.vibrate(15);
      setStatus('');
      startListening();
    });

    const onRelease = (e) => {
      if (e) e.preventDefault();
      if (!holding) return;
      holding = false;
      stopListening();
    };

    micEl.addEventListener('pointerup', onRelease);
    micEl.addEventListener('pointercancel', onRelease);
    micEl.addEventListener('contextmenu', (e) => e.preventDefault());
  })();
  </script>
</body>
</html>
